name: Deploy GitHub Pages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag that requested this deployment.
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Check release version
        if: inputs.release_tag != ''
        run: |
          node -e 'const pkg=require("./package.json"); const tag=process.env.RELEASE_TAG || ""; const expected="v"+pkg.version; if (tag !== expected) { console.error("Release tag " + tag + " does not match app/package.json version " + pkg.version + ". Expected " + expected + "."); process.exit(1); }'
        working-directory: app
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}

      - name: Build
        run: npm run build
        working-directory: app

      - name: Tests
        run: npm run test:all
        working-directory: app

      - name: File-size audit
        run: npm run audit:file-sizes
        working-directory: app

      - name: Dependency audit
        run: npm run audit:deps
        working-directory: app

      - name: Layer audit
        run: npm run audit:layers
        working-directory: app

  build:
    name: Build static site
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build
        run: npm run build
        working-directory: app

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
